name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  go-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - metadata-service
          - indexer-service
          - app/backend

    defaults:
      run:
        working-directory: ${{ matrix.module }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go 1.23
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Verify module hygiene
        env:
          GOTOOLCHAIN: local
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Run tests
        env:
          GOTOOLCHAIN: local
        run: go test ./... -count=1
