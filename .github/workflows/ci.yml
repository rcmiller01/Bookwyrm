name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  go-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - metadata-service
          - indexer-service
          - app/backend
          - launcher

    defaults:
      run:
        working-directory: ${{ matrix.module }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go 1.23
        uses: actions/setup-go@v6
        with:
          go-version: '1.23.x'
          cache: true
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Verify module hygiene
        env:
          GOTOOLCHAIN: local
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Run tests
        env:
          GOTOOLCHAIN: local
        run: go test ./... -count=1

  go-lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - metadata-service
          - indexer-service
          - app/backend
          - launcher

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go 1.23
        uses: actions/setup-go@v6
        with:
          go-version: '1.23.x'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: ${{ matrix.module }}
          args: --timeout=5m

  web-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/backend/web

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/backend/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
