name: Release Alpha

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Alpha version (example: 0.1.0-alpha)"
        required: true
        default: "0.1.0-alpha"
  push:
    tags:
      - "v*-alpha*"

permissions:
  contents: write

jobs:
  package-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "push") {
            $v = "${{ github.ref_name }}"
            if ($v.StartsWith("v")) { $v = $v.Substring(1) }
          } else {
            $v = "${{ github.event.inputs.version }}"
          }
          "value=$v" >> $env:GITHUB_OUTPUT

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: |
            **/go.sum

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/backend/web/package-lock.json

      - name: Install frontend dependencies
        shell: pwsh
        working-directory: app/backend/web
        run: npm ci

      - name: Verify frontend build
        shell: pwsh
        working-directory: app/backend/web
        run: npm run build

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build Windows artifacts
        shell: pwsh
        run: .\scripts\release\build-alpha-windows.ps1 -Version "${{ steps.version.outputs.value }}"

      - name: Sign installer
        if: ${{ secrets.WINDOWS_SIGNING_CERT_BASE64 != '' && secrets.WINDOWS_SIGNING_CERT_PASSWORD != '' }}
        shell: pwsh
        env:
          CERT_PFX_BASE64: ${{ secrets.WINDOWS_SIGNING_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD }}
          TIMESTAMP_URL: ${{ vars.WINDOWS_SIGNING_TIMESTAMP_URL }}
        run: |
          $version = "${{ steps.version.outputs.value }}"
          $setupExe = Resolve-Path "dist/release/bookwyrm-$version-setup.exe"
          $pfxPath = Join-Path $env:RUNNER_TEMP "bookwyrm-signing.pfx"
          [System.IO.File]::WriteAllBytes($pfxPath, [System.Convert]::FromBase64String($env:CERT_PFX_BASE64))

          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $signtool) {
            throw "signtool.exe not found on runner"
          }

          $timestamp = if ([string]::IsNullOrWhiteSpace($env:TIMESTAMP_URL)) { "http://timestamp.digicert.com" } else { $env:TIMESTAMP_URL }
          & $signtool sign /f $pfxPath /p $env:CERT_PASSWORD /fd SHA256 /td SHA256 /tr $timestamp /d "Bookwyrm" /v $setupExe
          if ($LASTEXITCODE -ne 0) { throw "signtool sign failed with exit code $LASTEXITCODE" }

      - name: Verify installer signature
        if: ${{ secrets.WINDOWS_SIGNING_CERT_BASE64 != '' && secrets.WINDOWS_SIGNING_CERT_PASSWORD != '' }}
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.value }}"
          $setupExe = Resolve-Path "dist/release/bookwyrm-$version-setup.exe"
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          & $signtool verify /pa /v $setupExe
          if ($LASTEXITCODE -ne 0) { throw "signtool verify failed with exit code $LASTEXITCODE" }

      - name: Signing not configured
        if: ${{ secrets.WINDOWS_SIGNING_CERT_BASE64 == '' || secrets.WINDOWS_SIGNING_CERT_PASSWORD == '' }}
        shell: pwsh
        run: Write-Warning "Installer signing skipped. Set WINDOWS_SIGNING_CERT_BASE64 and WINDOWS_SIGNING_CERT_PASSWORD to enable Authenticode signing."

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bookwyrm-${{ steps.version.outputs.value }}-windows
          path: |
            dist/release/bookwyrm-${{ steps.version.outputs.value }}-windows.zip
            dist/release/bookwyrm-${{ steps.version.outputs.value }}-setup.exe

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/bookwyrm-${{ steps.version.outputs.value }}-windows.zip
            dist/release/bookwyrm-${{ steps.version.outputs.value }}-setup.exe
          generate_release_notes: true
