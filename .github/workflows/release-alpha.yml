name: Release Alpha

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Alpha version (example: 0.1.0-alpha)"
        required: true
        default: "0.1.0-alpha"
  push:
    tags:
      - "v*-alpha*"

permissions:
  contents: write

jobs:
  package-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "push") {
            $v = "${{ github.ref_name }}"
            if ($v.StartsWith("v")) { $v = $v.Substring(1) }
          } else {
            $v = "${{ github.event.inputs.version }}"
          }
          "value=$v" >> $env:GITHUB_OUTPUT

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: |
            **/go.sum

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/backend/web/package-lock.json

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build Windows artifacts
        shell: pwsh
        run: .\scripts\release\build-alpha-windows.ps1 -Version "${{ steps.version.outputs.value }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bookwyrm-${{ steps.version.outputs.value }}-windows
          path: |
            dist/release/bookwyrm-${{ steps.version.outputs.value }}-windows.zip
            dist/release/bookwyrm-${{ steps.version.outputs.value }}-setup.exe

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/bookwyrm-${{ steps.version.outputs.value }}-windows.zip
            dist/release/bookwyrm-${{ steps.version.outputs.value }}-setup.exe
          generate_release_notes: true
