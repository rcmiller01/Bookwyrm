server:
  port: 8080

api:
  auth:
    enabled: false
    keys: []
  rate_limit:
    enabled: true
    requests_per_minute: 120
    burst: 20

# Database connection — override via environment variables for production:
#   DATABASE_HOST, DATABASE_USER, DATABASE_PASSWORD, DATABASE_NAME
# The values below are dev-only defaults and must NOT be used in production.
database:
  host: localhost
  port: 5432
  user: bookwyrm_dev
  password: changeme_dev_only
  dbname: bookwyrm

providers:
  dispatch_policy:
    quarantine_mode: last_resort

  openlibrary:
    enabled: true
    timeout_seconds: 10
    rate_limit: 100
    priority: 100
  googlebooks:
    enabled: false
    timeout_seconds: 6
    rate_limit: 8
    priority: 200
    api_key: ""
  hardcover:
    enabled: false
    timeout_seconds: 10
    rate_limit: 2
    priority: 300
    api_key: ""
  crossref:
    enabled: false
    timeout_seconds: 6
    rate_limit: 3
    priority: 350
    mailto: ""
    base_url: "https://api.crossref.org"
  annasarchive:
    enabled: false
    timeout_seconds: 15
    rate_limit: 30
    priority: 400
    base_url: "https://annas-archive.org"
  librarything:
    enabled: false
    timeout_seconds: 15
    rate_limit: 30
    priority: 500
    base_url: "https://www.librarything.com"
  worldcat:
    enabled: false
    timeout_seconds: 15
    rate_limit: 30
    priority: 600
    base_url: "https://www.worldcat.org"

health_monitor:
  enabled: true
  interval_minutes: 5

enrichment:
  enabled: true
  worker_count: 2
  max_jobs_per_request: 5
  limits:
    max_author_works: 50
    max_work_editions: 100
  preferences:
    languages: ["en"]
    formats: ["epub", "audiobook"]

recommendation:
  cache_ttl_hours: 2
  max_depth: 2
  max_candidate_pool: 250
  series_limit: 10
  author_limit: 25
  max_subjects: 10
  max_works_per_subject: 10
  relationship_limit: 100
  weights:
    series_neighbor: 1.00
    same_series: 0.85
    same_author: 0.70
    shared_subject: 0.55
    explicit_related: 0.90
    preference_boost: 0.05
