server:
  port: 8080

database:
  host: localhost
  port: 5432
  user: metadata
  password: metadata
  dbname: metadata

providers:
  dispatch_policy:
    quarantine_mode: last_resort

  openlibrary:
    enabled: true
    timeout_seconds: 10
    rate_limit: 100
    priority: 100
  googlebooks:
    enabled: false
    timeout_seconds: 10
    rate_limit: 100
    priority: 200
    api_key: ""
  hardcover:
    enabled: false
    timeout_seconds: 15
    rate_limit: 60
    priority: 300
    api_key: ""

health_monitor:
  enabled: true
  interval_minutes: 5

enrichment:
  enabled: true
  worker_count: 2
  max_jobs_per_request: 5
  limits:
    max_author_works: 50
    max_work_editions: 100
  preferences:
    languages: ["en"]
    formats: ["epub", "audiobook"]
