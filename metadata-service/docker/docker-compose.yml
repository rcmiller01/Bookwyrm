version: '3.8'

services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: metadata
      POSTGRES_PASSWORD: metadata
      POSTGRES_DB: metadata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metadata"]
      interval: 5s
      timeout: 5s
      retries: 5

  metadata-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_HOST: postgres
      DATABASE_USER: metadata
      DATABASE_PASSWORD: metadata
      DATABASE_NAME: metadata
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
