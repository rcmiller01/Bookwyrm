services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bookwyrm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bookwyrm}
      POSTGRES_DB: ${POSTGRES_DB:-bookwyrm}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  metadata-service:
    build:
      context: ./metadata-service
      dockerfile: docker/Dockerfile
    environment:
      DATABASE_HOST: ${POSTGRES_HOST:-postgres}
      DATABASE_PORT: "5432"
      DATABASE_USER: ${POSTGRES_USER:-bookwyrm}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-bookwyrm}
      DATABASE_NAME: ${POSTGRES_DB:-bookwyrm}
      METADATA_API_AUTH_ENABLED: ${METADATA_API_AUTH_ENABLED:-false}
      METADATA_API_KEYS: ${METADATA_API_KEYS:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${METADATA_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  indexer-service:
    build:
      context: ./indexer-service
      dockerfile: docker/Dockerfile
    environment:
      DATABASE_DSN: postgres://${POSTGRES_USER:-bookwyrm}:${POSTGRES_PASSWORD:-bookwyrm}@${POSTGRES_HOST:-postgres}:5432/${POSTGRES_DB:-bookwyrm}?sslmode=disable
      INDEXER_SERVICE_ADDR: ${INDEXER_SERVICE_ADDR:-:8091}
      PROWLARR_BASE_URL: ${PROWLARR_BASE_URL:-}
      PROWLARR_API_KEY: ${PROWLARR_API_KEY:-}
      INDEXER_QUARANTINE_MODE: ${INDEXER_QUARANTINE_MODE:-last_resort}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${INDEXER_PORT:-8091}:8091"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8091/v1/indexer/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  app-backend:
    build:
      context: ./app/backend
      dockerfile: docker/Dockerfile
    environment:
      APP_BACKEND_ADDR: ${APP_BACKEND_ADDR:-:8090}
      METADATA_SERVICE_URL: http://metadata-service:8080
      METADATA_SERVICE_API_KEY: ${METADATA_SERVICE_API_KEY:-}
      INDEXER_SERVICE_URL: http://indexer-service:8091
      INDEXER_SERVICE_API_KEY: ${INDEXER_SERVICE_API_KEY:-}
      DATABASE_DSN: postgres://${POSTGRES_USER:-bookwyrm}:${POSTGRES_PASSWORD:-bookwyrm}@${POSTGRES_HOST:-postgres}:5432/${POSTGRES_DB:-bookwyrm}?sslmode=disable
      LIBRARY_ROOT: ${LIBRARY_ROOT:-/library}
      LIBRARY_ALLOW_CROSS_DEVICE_MOVE: ${LIBRARY_ALLOW_CROSS_DEVICE_MOVE:-true}
      IMPORT_KEEP_INCOMING: ${IMPORT_KEEP_INCOMING:-true}
      QBITTORRENT_BASE_URL: ${QBITTORRENT_BASE_URL:-}
      QBITTORRENT_USERNAME: ${QBITTORRENT_USERNAME:-}
      QBITTORRENT_PASSWORD: ${QBITTORRENT_PASSWORD:-}
      SABNZBD_BASE_URL: ${SABNZBD_BASE_URL:-}
      SABNZBD_API_KEY: ${SABNZBD_API_KEY:-}
      SABNZBD_CATEGORY: ${SABNZBD_CATEGORY:-books}
      NZBGET_BASE_URL: ${NZBGET_BASE_URL:-}
      NZBGET_USERNAME: ${NZBGET_USERNAME:-}
      NZBGET_PASSWORD: ${NZBGET_PASSWORD:-}
      NZBGET_CATEGORY: ${NZBGET_CATEGORY:-books}
      DOWNLOAD_QUARANTINE_MODE: ${DOWNLOAD_QUARANTINE_MODE:-last_resort}
    volumes:
      - ${LIBRARY_ROOT_HOST:-./library}:/library
    depends_on:
      postgres:
        condition: service_healthy
      metadata-service:
        condition: service_healthy
      indexer-service:
        condition: service_healthy
    ports:
      - "${APP_BACKEND_PORT:-8090}:8090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/api/v1/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

volumes:
  postgres_data:
